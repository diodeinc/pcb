- name: Setup Rust toolchain (Windows)
  if: runner.os == 'Windows'
  uses: actions-rust-lang/setup-rust-toolchain@v1
  with:
    rustflags: ""
    toolchain: stable-x86_64-pc-windows-msvc
    cache-bin: false

- name: Setup Rust toolchain
  if: runner.os != 'Windows'
  uses: actions-rust-lang/setup-rust-toolchain@v1
  with:
    cache-bin: false
