name: Build CLI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-main
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubicloud-standard-30-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
          target: x86_64-unknown-linux-gnu
      
      - name: Build PCB CLI
        run: cargo build --profile dist -p pcb -p pcbc --bins --target x86_64-unknown-linux-gnu
      
      - name: Prepare artifacts
        run: |
          set -euo pipefail
          mkdir -p dist-main
          cp target/x86_64-unknown-linux-gnu/dist/pcb dist-main/pcb-x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/dist/pcbc dist-main/pcbc-x86_64-unknown-linux-gnu
          shasum -a 256 dist-main/pcb-x86_64-unknown-linux-gnu > dist-main/pcb-x86_64-unknown-linux-gnu.sha256
          shasum -a 256 dist-main/pcbc-x86_64-unknown-linux-gnu > dist-main/pcbc-x86_64-unknown-linux-gnu.sha256
          cat > dist-main/main.json <<EOF
          {
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}"
          }
          EOF

      - name: Upload PCB CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcb-cli-linux-${{ github.sha }}
          path: dist-main/*
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PCB_RELEASE_S3_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload main build to S3
        run: |
          aws s3 sync dist-main/ "s3://diode-pcb-releases/pcb/main/" \
            --cache-control "public, max-age=60"
