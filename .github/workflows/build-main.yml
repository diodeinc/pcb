name: Build CLI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-main
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubicloud-standard-30-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
      
      - name: Build PCB CLI
        run: cargo build --release --bin pcb
      
      - name: Upload PCB CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcb-cli-linux-${{ github.sha }}
          path: target/release/pcb
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PCB_RELEASE_S3_ROLE_ARN }}
          aws-region: us-east-1

      - name: Prepare latest main build
        run: |
          mkdir -p dist-main
          cp target/release/pcb dist-main/pcb
          shasum -a 256 dist-main/pcb | awk '{print $1}' > dist-main/pcb.sha256
          cat > dist-main/latest.json <<EOF
          {
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}"
          }
          EOF

      - name: Upload latest main build to S3
        run: |
          aws s3 sync dist-main/ "s3://diode-pcb-releases/pcb/latest/" \
            --cache-control "public, max-age=60"
