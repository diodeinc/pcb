name: Upload release artifacts to S3

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  upload:
    name: upload-s3
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Remove dist manifest artifacts
        run: rm -f artifacts/*-dist-manifest.json

      - name: Create pcbc toolchain artifacts
        run: |
          set -euo pipefail

          # cargo-dist 0.31 treats this workspace as one app named `pcb` and emits the
          # usual `pcb-*` archives. Phase 1 keeps that installer/release behavior stable
          # and derives S3-only `pcbc-*` toolchain archives from those dist artifacts.
          for archive in artifacts/pcb-*.tar.xz; do
            [ -e "$archive" ] || continue
            toolchain_archive="artifacts/pcbc-${archive#artifacts/pcb-}"
            tmp="$(mktemp -d)"
            tar -xf "$archive" -C "$tmp"
            binary="$(find "$tmp" -type f -name pcb -print -quit)"
            if [ -z "$binary" ]; then
              echo "did not find pcb binary in $archive" >&2
              exit 1
            fi
            mv "$binary" "$(dirname "$binary")/pcbc"
            root="$(find "$tmp" -mindepth 1 -maxdepth 1 -type d -print -quit)"
            tar -C "$tmp" -cJf "$toolchain_archive" "$(basename "$root")"
            shasum -a 256 "$toolchain_archive" \
              | awk -v name="$(basename "$toolchain_archive")" '{print $1 " *" name}' \
              > "$toolchain_archive.sha256"
            rm -rf "$tmp"
          done

          for archive in artifacts/pcb-*.zip; do
            [ -e "$archive" ] || continue
            toolchain_archive="artifacts/pcbc-${archive#artifacts/pcb-}"
            python3 - "$archive" "$toolchain_archive" <<'PY'
          import sys
          import zipfile

          src, dst = sys.argv[1:]
          with zipfile.ZipFile(src, "r") as zin, zipfile.ZipFile(dst, "w", zipfile.ZIP_DEFLATED) as zout:
              for info in zin.infolist():
                  data = zin.read(info.filename)
                  filename = info.filename
                  if filename.endswith("/pcb.exe") or filename == "pcb.exe":
                      filename = filename[:-len("pcb.exe")] + "pcbc.exe"
                  out = zipfile.ZipInfo(filename, info.date_time)
                  out.external_attr = info.external_attr
                  out.comment = info.comment
                  out.extra = info.extra
                  out.create_system = info.create_system
                  out.compress_type = zipfile.ZIP_DEFLATED
                  zout.writestr(out, data)
          PY
            shasum -a 256 "$toolchain_archive" \
              | awk -v name="$(basename "$toolchain_archive")" '{print $1 " *" name}' \
              > "$toolchain_archive.sha256"
          done

          if [ -f artifacts/sha256.sum ]; then
            find artifacts -maxdepth 1 \( -name 'pcbc-*.tar.xz' -o -name 'pcbc-*.zip' \) -print0 \
              | sort -z \
              | while IFS= read -r -d '' artifact; do
                  shasum -a 256 "$artifact" \
                    | awk -v name="$(basename "$artifact")" '{print $1 " *" name}'
                done >> artifacts/sha256.sum
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PCB_RELEASE_S3_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload immutable release artifacts
        run: |
          aws s3 sync artifacts/ "s3://diode-pcb-releases/pcb/${{ github.ref_name }}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "pcb-installer.sh" \
            --exclude "pcb-installer.ps1"

      - name: Upload installer scripts with short cache
        run: |
          if [ -f artifacts/pcb-installer.sh ]; then
            aws s3 cp artifacts/pcb-installer.sh \
              "s3://diode-pcb-releases/pcb/${{ github.ref_name }}/pcb-installer.sh" \
              --cache-control "public, max-age=300"
          fi

          if [ -f artifacts/pcb-installer.ps1 ]; then
            aws s3 cp artifacts/pcb-installer.ps1 \
              "s3://diode-pcb-releases/pcb/${{ github.ref_name }}/pcb-installer.ps1" \
              --cache-control "public, max-age=300"
          fi

      - name: Publish latest stable release
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "Skipping latest release pointers for prerelease $GITHUB_REF_NAME"
            exit 0
          fi

          aws s3 sync artifacts/ "s3://diode-pcb-releases/pcb/latest/" \
            --cache-control "public, max-age=60"

          jq -n \
            --arg version "${GITHUB_REF_NAME#v}" \
            --arg tag "$GITHUB_REF_NAME" \
            --arg published_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg base_url "https://pcb.api.diode.computer/pcb/$GITHUB_REF_NAME" \
            '{
              version: $version,
              tag: $tag,
              published_at: $published_at,
              shell_installer: ($base_url + "/pcb-installer.sh"),
              powershell_installer: ($base_url + "/pcb-installer.ps1"),
              dist_manifest: ($base_url + "/dist-manifest.json")
            }' > latest.json

          aws s3 cp latest.json "s3://diode-pcb-releases/pcb/latest.json" \
            --cache-control "public, max-age=60" \
            --content-type "application/json"
