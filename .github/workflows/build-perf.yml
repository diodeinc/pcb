name: Build Performance

on:
  pull_request:
    branches: [main]

concurrency:
  group: build-perf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build_perf:
    name: pcb build performance
    runs-on: ubicloud-standard-16
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - name: Checkout benchmark workspace
        run: |
          key="$RUNNER_TEMP/code-diode-key"
          ssh-keygen -q -t ed25519 -N '' -f "$key"
          export GIT_SSH_COMMAND="ssh -o BatchMode=yes -o IdentitiesOnly=yes -o IdentityFile=$key -o IdentityAgent=none -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@code.diode.computer:demo/b/Demeter workspaces/Demeter
          git clone --depth 1 git@code.diode.computer:demo/b/DM0001 workspaces/DM0001
          git clone --depth 1 git@code.diode.computer:demo/b/DM0002 workspaces/DM0002
          git clone --depth 1 git@code.diode.computer:demo/b/DM0003 workspaces/DM0003
          git clone --depth 1 git@code.diode.computer:demo/b/Feign workspaces/Feign
          git clone --depth 1 git@code.diode.computer:demo/b/Renfield workspaces/Renfield
          git clone --depth 1 git@code.diode.computer:demo/b/Seward workspaces/Seward
          git clone --depth 1 git@code.diode.computer:arduino/b/Nano workspaces/Nano
          git clone --depth 1 git@code.diode.computer:arduino/b/unoQ workspaces/unoQ

      - name: Install hyperfine
        run: |
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.20.0/hyperfine_1.20.0_amd64.deb
          sudo dpkg -i hyperfine_1.20.0_amd64.deb

      - name: Run performance benchmarks
        run: |
          mkdir -p perf
          PCB_INSTALL_DIR="$RUNNER_TEMP/pcb-bin" ./install.sh --local
          shim="$RUNNER_TEMP/pcb-bin/pcb"
          workspaces="Demeter DM0001 DM0002 DM0003 Feign Renfield Seward Nano unoQ"

          bench() {
            suffix="$1"
            selector="$2"
            for workspace in $workspaces; do
              python3 bin/pcb-build-perf \
                --pcb "$shim" \
                --pcb-arg "$selector" \
                --workspace "workspaces/$workspace" \
                --suppress bom \
                --output "perf/$workspace-$suffix.json"
            done
          }

          bench nightly +nightly
          bench local +local

      - name: Create PR comment body
        id: perf_comment
        run: |
          python3 - <<'PY'
          import json
          import math
          from pathlib import Path

          def load(path):
            with open(path, "r", encoding="utf-8") as handle:
              return json.load(handle)

          def fmt_ms(value, stddev=None):
            """Format time in ms with optional ± stddev."""
            ms = value * 1000
            if stddev is not None and stddev > 0:
              stddev_ms = stddev * 1000
              # Use 1 decimal for small values, 0 for larger
              if stddev_ms < 1:
                return f"{ms:.0f}ms ±{stddev_ms:.1f}"
              return f"{ms:.0f}ms ±{stddev_ms:.0f}"
            return f"{ms:.0f}ms"

          def analyze_change(nightly, local):
            """Compare nightly vs local using median and check for significance."""
            nightly_median = nightly["median_seconds"]
            local_median = local["median_seconds"]
            nightly_stddev = nightly["stddev_seconds"]
            local_stddev = local["stddev_seconds"]

            delta = local_median - nightly_median
            pct = (delta / nightly_median * 100) if nightly_median > 0 else None

            # Use pooled stddev for significance check
            # Change is significant if |delta| > combined noise floor
            noise = math.sqrt(nightly_stddev ** 2 + local_stddev ** 2)
            significant = False
            if pct is not None and abs(pct) >= 5:
              # Require delta to exceed 2x the noise floor
              if noise == 0 or abs(delta) > 2 * noise:
                significant = True

            return delta, pct, significant

          def compute_speedup(nightly, local):
            """Compute speedup ratio with uncertainty (like hyperfine comparison)."""
            nightly_mean = nightly["mean_seconds"]
            local_mean = local["mean_seconds"]
            nightly_stddev = nightly["stddev_seconds"]
            local_stddev = local["stddev_seconds"]

            if local_mean <= 0 or nightly_mean <= 0:
              return None, None

            ratio = nightly_mean / local_mean  # >1 means local is faster

            # Propagate uncertainty: for ratio r = a/b, σ_r/r = sqrt((σ_a/a)² + (σ_b/b)²)
            rel_err_nightly = nightly_stddev / nightly_mean if nightly_mean > 0 else 0
            rel_err_local = local_stddev / local_mean if local_mean > 0 else 0
            rel_err = math.sqrt(rel_err_nightly ** 2 + rel_err_local ** 2)
            ratio_err = ratio * rel_err

            return ratio, ratio_err

          rows = []
          has_significant = False
          workspace_labels = {
            "Demeter": "demo/b/Demeter",
            "DM0001": "demo/b/DM0001",
            "DM0002": "demo/b/DM0002",
            "DM0003": "demo/b/DM0003",
            "Feign": "demo/b/Feign",
            "Renfield": "demo/b/Renfield",
            "Seward": "demo/b/Seward",
            "Nano": "arduino/b/Nano",
            "unoQ": "arduino/b/unoQ",
          }

          for name in ["Demeter", "DM0001", "DM0002", "DM0003", "Feign", "Renfield", "Seward", "Nano", "unoQ"]:
            nightly = load(Path("perf") / f"{name}-nightly.json")
            local = load(Path("perf") / f"{name}-local.json")
            nightly_boards = {b["zen_path"]: b for b in nightly.get("boards", [])}
            local_boards = {b["zen_path"]: b for b in local.get("boards", [])}
            all_paths = sorted(set(nightly_boards) | set(local_boards))

            for zen_path in all_paths:
              nightly_board = nightly_boards.get(zen_path)
              local_board = local_boards.get(zen_path)
              board_name = zen_path
              if local_board and local_board.get("name"):
                board_name = local_board["name"]
              elif nightly_board and nightly_board.get("name"):
                board_name = nightly_board["name"]
              workspace_label = workspace_labels[name]
              if board_name.lower() == name.lower():
                label = workspace_label
              else:
                label = f"{workspace_label}/{board_name}"

              if not nightly_board or not local_board:
                rows.append((label, "—", "—", "missing"))
                continue

              delta, pct, significant = analyze_change(nightly_board, local_board)
              ratio, ratio_err = compute_speedup(nightly_board, local_board)

              nightly_str = fmt_ms(nightly_board["median_seconds"], nightly_board["stddev_seconds"])
              local_str = fmt_ms(local_board["median_seconds"], local_board["stddev_seconds"])

              if pct is None:
                change_text = "—"
              elif not significant:
                change_text = f"{pct:+.1f}%"
              else:
                has_significant = True
                if ratio is not None and ratio_err is not None:
                  if pct < 0:
                    change_text = f"**{ratio:.2f}× ±{ratio_err:.2f} faster**"
                  else:
                    change_text = f"**{1/ratio:.2f}× ±{ratio_err/ratio**2:.2f} slower**"
                else:
                  if pct < 0:
                    change_text = f"**{pct:+.1f}% faster**"
                  else:
                    change_text = f"**{pct:+.1f}% slower**"

              rows.append((label, nightly_str, local_str, change_text))

          lines = ["### Build Performance", ""]
          lines.append("| Board | Nightly (median) | Local (median) | Change |")
          lines.append("|:------|-----:|-----:|:------|")
          for label, nightly, local, change in rows:
            lines.append(f"| {label} | {nightly} | {local} | {change} |")
          lines.append("")
          lines.append("<sub>Measured with [hyperfine](https://github.com/sharkdp/hyperfine). Times show median ±stddev.</sub>")
          lines.append("")
          lines.append("<!-- pcb-build-perf -->")

          body = "\n".join(lines)
          Path("perf/comment.txt").write_text(body, encoding="utf-8")

          # Always write to job summary
          import os
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write(body + "\n")

          has_changes = "true" if has_significant else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"has_changes={has_changes}\n")
          PY

      - name: Find existing comment
        id: find_comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- pcb-build-perf -->"

      - name: Create or update comment
        if: steps.perf_comment.outputs.has_changes == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          body-path: perf/comment.txt
          edit-mode: replace

      - name: Delete stale comment
        if: steps.perf_comment.outputs.has_changes == 'false' && steps.find_comment.outputs.comment-id != ''
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.find_comment.outputs.comment-id }}
            })
