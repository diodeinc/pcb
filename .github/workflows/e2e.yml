name: E2E CLI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  KICAD_VERSION: 10.0.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.runs-on }}
    container: ${{ matrix.config.container }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: macOS
            runs-on: macos-15-xlarge
          - name: Ubuntu
            runs-on: ubicloud-standard-16
            container:
              image: ghcr.io/diodeinc/kicad:10.0.0
              options: --user root
    steps:
      - uses: actions/checkout@v5

      - name: Install Dependencies (Ubuntu)
        if: matrix.config.name == 'Ubuntu'
        run: |
          apt-get update
          apt-get install -y curl build-essential pkg-config libssl-dev

      - name: Cache KiCad (macOS)
        if: matrix.config.name == 'macOS'
        id: cache-kicad-mac
        uses: actions/cache@v5
        with:
          path: /Applications/KiCad
          key: ${{ runner.os }}-kicad-${{ env.KICAD_VERSION }}

      - name: Install KiCad (macOS)
        if: matrix.config.name == 'macOS' && steps.cache-kicad-mac.outputs.cache-hit != 'true'
        run: |
          brew update
          brew uninstall --cask kicad 2>/dev/null || true
          rm -rf /Applications/KiCad 2>/dev/null || true
          brew install --cask kicad

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - name: Install local pcb toolchain
        run: |
          ./install.sh --local
          export PATH="$HOME/.local/bin:$PATH"
          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64) pcbc="$HOME/Library/Application Support/pcb/toolchains/local/aarch64-apple-darwin/pcbc" ;;
            Darwin-x86_64) pcbc="$HOME/Library/Application Support/pcb/toolchains/local/x86_64-apple-darwin/pcbc" ;;
            Linux-aarch64|Linux-arm64) pcbc="${XDG_DATA_HOME:-$HOME/.local/share}/pcb/toolchains/local/aarch64-unknown-linux-gnu/pcbc" ;;
            Linux-x86_64) pcbc="${XDG_DATA_HOME:-$HOME/.local/share}/pcb/toolchains/local/x86_64-unknown-linux-gnu/pcbc" ;;
            *) echo "unsupported platform: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          ln -sf "$pcbc" "$HOME/.local/bin/pcbc"
          pcb --help
          pcbc --help

      - name: Build examples
        run: pcbc build examples

      - name: Test workspace with pcb.toml
        env:
          RUST_LOG: info,pcbc::release=debug,pcbc::bom=debug
        run: |
          pcbc bom test-workspaces/with-pcb-toml/boards/WorkspaceTestBoard.zen
          pcbc layout test-workspaces/with-pcb-toml/boards/WorkspaceTestBoard.zen --no-open
          pcbc publish test-workspaces/with-pcb-toml/boards/WorkspaceTestBoard.zen -S layout.drc.invalid_outline

      - name: Test pcb new
        run: |
          cd /tmp
          pcbc new board TB0001 github.com/test/TB0001
          cd TB0001
          pcbc new package modules/mod_a
          pcbc build .

      - name: Test stdlib builds
        run: pcbc build lib/std/ -S bom

      - name: Checkout kicad-test-fixtures
        uses: actions/checkout@v5
        with:
          repository: diodeinc/kicad-test-fixtures
          token: ${{ secrets.DIODE_ROBOT_TOKEN }}
          path: kicad-test-fixtures

      - name: Test pcb import (E2E)
        run: |
          find kicad-test-fixtures -name '*.kicad_pro' | while IFS= read -r pro; do
            echo "=== Importing $pro ==="
            out="./test-import/$(basename "${pro%.kicad_pro}")"
            pcbc import "$pro" "$out"
          done
          for board_zen in ./test-import/*/*.zen; do
            echo "=== Build $board_zen ==="
            pcbc build "$board_zen" -S bom
            echo "=== Layout $board_zen ==="
            pcbc layout "$board_zen" --no-open -S bom
          done
