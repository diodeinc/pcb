[package]
name = "rectifier"
version = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
authors = { workspace = true }
description = "Infer and patch KiCad footprint 3D model rotate/offset from STEP geometry"

[[bin]]
name = "rectifier"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

pcb-sexpr = { workspace = true }

# Foxtrot STEP parsing + tessellation
triangulate = { workspace = true }

base64 = { workspace = true }
zstd = { workspace = true }
regex = { workspace = true }

# Numerics: raster grids, FFT-based mask correlation, parallel pose scan
ndarray = { workspace = true }
realfft = { workspace = true }
rustfft = { workspace = true }
num-complex = { workspace = true }
rayon = { workspace = true }

# Polygon booleans
clipper2-rust = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# CLI progress bars for `bench` / `audit` batches.
indicatif = { workspace = true, features = ["rayon"] }
